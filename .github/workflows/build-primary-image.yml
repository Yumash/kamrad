name: Build Primary Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (no "v" prefix, e.g. "0.1.0")'
        required: true
        type: string
      tag_latest:
        description: 'Also tag as :latest?'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build and push primary image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            # Tag as latest only for non-prerelease tags
            if [[ "$VERSION" != *"-"* ]]; then
              echo "tag_latest=true" >> $GITHUB_OUTPUT
            else
              echo "tag_latest=false" >> $GITHUB_OUTPUT
            fi
          else
            VERSION="${{ inputs.version }}"
            echo "tag_latest=${{ inputs.tag_latest }}" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/yumash/kamrad:${{ steps.version.outputs.version }}
            ghcr.io/yumash/kamrad:v${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.tag_latest == 'true' && 'ghcr.io/yumash/kamrad:latest' || '' }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ github.sha }}
