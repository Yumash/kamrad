name: Build Disk Collector Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to label the Docker image under (no "v" prefix, e.g. "0.1.0")'
        required: true
        type: string
      tag_latest:
        description: 'Also tag this image as :latest?'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build disk-collector image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: install/sidecar-disk-collector
          push: true
          tags: |
            ghcr.io/yumash/kamrad-disk-collector:${{ inputs.version }}
            ghcr.io/yumash/kamrad-disk-collector:v${{ inputs.version }}
            ${{ inputs.tag_latest && 'ghcr.io/yumash/kamrad-disk-collector:latest' || '' }}
