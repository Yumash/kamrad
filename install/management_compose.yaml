# КАМРАД — конфигурация Docker Compose
# Based on Project N.O.M.A.D. by Crosstalk Solutions LLC (Apache 2.0)
#
# Этот compose-файл определяет админ-сервер, базу данных и другие сервисы для КАМРАД.
# Используйте `docker-compose up -d` для запуска всех сервисов.
#
# Замените значения "replaceme" на свои перед запуском.
name: kamrad
services:
  admin:
    image: ghcr.io/yumash/kamrad:latest
    pull_policy: always
    container_name: kamrad_admin
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    volumes:
      - /opt/kamrad/storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - kamrad-update-shared:/app/update-shared
    environment:
      - NODE_ENV=production
      - PORT=8080
      - LOG_LEVEL=info
      - APP_KEY=replaceme
      - HOST=0.0.0.0
      - URL=replaceme
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=kamrad
      - DB_USER=kamrad_user
      - DB_PASSWORD=replaceme
      - DB_NAME=kamrad
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  dozzle:
    image: amir20/dozzle:v10.0
    container_name: kamrad_dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOZZLE_ENABLE_ACTIONS=false
      - DOZZLE_ENABLE_SHELL=false
  mysql:
    image: mysql:8.0
    container_name: kamrad_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=replaceme
      - MYSQL_DATABASE=kamrad
      - MYSQL_USER=kamrad_user
      - MYSQL_PASSWORD=replaceme
    volumes:
      - /opt/kamrad/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
  redis:
    image: redis:7-alpine
    container_name: kamrad_redis
    restart: unless-stopped
    volumes:
      - /opt/kamrad/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
  updater:
    image: ghcr.io/yumash/kamrad-sidecar-updater:latest
    pull_policy: always
    container_name: kamrad_updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/kamrad:/opt/kamrad
      - kamrad-update-shared:/shared
  disk-collector:
    image: ghcr.io/yumash/kamrad-disk-collector:latest
    pull_policy: always
    container_name: kamrad_disk_collector
    restart: unless-stopped
    volumes:
      - /:/host:ro,rslave
      - /opt/kamrad/storage:/storage

volumes:
  kamrad-update-shared:
    driver: local
